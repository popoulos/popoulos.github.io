<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IzyLife — Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fb;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .brand {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #a855f7;
            margin-bottom: 8px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
        }
        .apps {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            justify-content: center;
        }
        .app-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 160px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .app-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        .app-card img {
            width: 80px;
            height: 80px;
            border-radius: 18px;
        }
        .app-card .name {
            font-size: 15px;
            font-weight: 600;
        }
        .app-card .desc {
            font-size: 12px;
            color: #6b7280;
            text-align: center;
            line-height: 1.4;
        }
        footer {
            margin-top: 60px;
            font-size: 12px;
            color: #9ca3af;
        }
        footer a {
            color: #a855f7;
            text-decoration: none;
        }

        @media (prefers-color-scheme: dark) {
            body { background: #0f0f1a; color: #f5f5f7; }
            .app-card { background: #1a1a2e; border-color: #2d2d40; }
            .app-card:hover { box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3); }
            .app-card .desc { color: #9ca3af; }
            footer { color: #6b7280; }
        }
    </style>
</head>
<body>
    <div class="brand">IZYLIFE</div>
    <h1>Nos applications</h1>
    <div class="apps">
        <a class="app-card" href="https://apps.apple.com/app/izylife-split/id6746268490" target="_blank" rel="noopener">
            <img src="assets/split-icon.png" alt="IzyLife Split">
            <span class="name">Split</span>
            <span class="desc">Partage d'addition simple et rapide</span>
        </a>
    </div>
    <footer>
        <a href="/izylife-privacy">Politique de confidentialit&eacute;</a>
    </footer>
</body>
</html>
